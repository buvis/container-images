# koolna-cache: squid caching proxy for package downloads
# Caches HTTPS content via SSL bump for mise, pip, npm, apt

http_port 3128 ssl-bump \
  cert=/etc/squid/ssl_cert/ca.pem \
  key=/etc/squid/ssl_cert/ca.key \
  generate-host-certificates=on \
  dynamic_cert_mem_cache_size=16MB

sslcrtd_program /usr/lib/squid/security_file_certgen -s /var/spool/squid/ssl_db -M 64MB

acl step1 at_step SslBump1
ssl_bump peek step1
ssl_bump bump all

# Allow all traffic through the proxy
acl localnet src 10.0.0.0/8
acl localnet src 172.16.0.0/12
acl localnet src 192.168.0.0/16
acl SSL_ports port 443
acl Safe_ports port 80
acl Safe_ports port 443
acl CONNECT method CONNECT

http_access deny !Safe_ports
http_access deny CONNECT !SSL_ports
http_access allow localnet
http_access allow localhost
http_access deny all

# Cache storage on PVC
cache_dir ufs /var/spool/squid/cache 10240 16 256
maximum_object_size 512 MB
cache_mem 256 MB

# Immutable tarballs and wheels: cache aggressively
refresh_pattern -i \.tar\.gz$      10080 90% 43200 override-expire override-lastmod ignore-no-cache ignore-no-store
refresh_pattern -i \.tar\.xz$      10080 90% 43200 override-expire override-lastmod ignore-no-cache ignore-no-store
refresh_pattern -i \.tgz$          10080 90% 43200 override-expire override-lastmod ignore-no-cache ignore-no-store
refresh_pattern -i \.whl$          10080 90% 43200 override-expire override-lastmod ignore-no-cache ignore-no-store
refresh_pattern -i \.zip$          10080 90% 43200 override-expire override-lastmod ignore-no-cache ignore-no-store

# Metadata endpoints: short TTL
refresh_pattern -i /simple/        5     20%  60
refresh_pattern -i registry\.npmjs\.org/[^/]+$  5  20%  60

# Default
refresh_pattern .                  60    20%  4320

# Logging
access_log stdio:/var/log/squid/access.log
cache_log /var/log/squid/cache.log

# Run as proxy user
cache_effective_user proxy
cache_effective_group proxy

# Coredumps off
coredump_dir /var/spool/squid
