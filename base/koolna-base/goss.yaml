---
command:
  mise --version:
    exit-status: 0
  git --version:
    exit-status: 0
  kubectl version --client:
    exit-status: 0
  nvim --version:
    exit-status: 0
  lazygit --version:
    exit-status: 0
  vifm --version:
    exit-status: 0
file:
  /etc/profile.d/koolna-paths.sh:
    exists: true
    mode: "0644"
    contains:
      - 'export PATH="$HOME/.local/bin:$HOME/.local/share/mise/shims:/usr/local/bin:$PATH"'
env:
  XDG_DATA_HOME:
    value: /cache/xdg-data
  # Negative invariant: XDG_CACHE_HOME must stay unset at the image layer.
  # Pinning it to /cache/* re-introduces the uv-hardlink regression that the
  # operator team already fixed (see operator CHANGELOG, "stop pinning mise/uv
  # caches to /cache"). goss reads via os.Getenv, which returns "" for unset,
  # so an empty-value assertion fails at build time if anyone re-adds an
  # `ENV XDG_CACHE_HOME=...` directive.
  XDG_CACHE_HOME:
    value: ""
