apiVersion: apps/v1
kind: Deployment
metadata:
  name: koolna-token-broker
  namespace: koolna
spec:
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app: koolna-token-broker
  template:
    metadata:
      labels:
        app: koolna-token-broker
    spec:
      serviceAccountName: koolna-token-broker
      securityContext:
        fsGroup: 1000
      containers:
        - name: broker
          image: ghcr.io/buvis/koolna-token-broker:latest
          ports:
            - containerPort: 8080
          env:
            - name: HOME
              value: /home/broker
          resources:
            requests:
              cpu: 50m
              memory: 128Mi
            limits:
              memory: 256Mi
          volumeMounts:
            - name: data
              mountPath: /home/broker
          readinessProbe:
            httpGet:
              path: /health
              port: 8080
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            tcpSocket:
              port: 8080
            initialDelaySeconds: 15
            periodSeconds: 30
      volumes:
        - name: data
          persistentVolumeClaim:
            claimName: koolna-token-broker-data
