  # change so new koolna pods pick up the new digest.
  # renovate: datasource=docker depName=ghcr.io/buvis/koolna-git-clone
  KOOLNA_GIT_CLONE_IMAGE: "ghcr.io/buvis/koolna-git-clone:v0.3.1@sha256:175287f4fde699121754555aba2f1bd4424ef350ff4213024074d612ee958a36"
  # renovate: datasource=docker depName=ghcr.io/buvis/koolna-session-manager
  KOOLNA_SESSION_MANAGER_IMAGE: "ghcr.io/buvis/koolna-session-manager:v0.5.0@sha256:324082efd6d43d56d7f669a9c3ddf0dae12e7bc170dc0731fb1bc3918ff68251"
