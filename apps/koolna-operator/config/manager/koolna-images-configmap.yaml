  # change so new koolna pods pick up the new digest.
  # renovate: datasource=docker depName=ghcr.io/buvis/koolna-git-clone
  KOOLNA_GIT_CLONE_IMAGE: "ghcr.io/buvis/koolna-git-clone:v0.3.2@sha256:8dc921fab7479b17608b5f6c3b4f8fce295f20b895db379cf92bfd0a2994b37d"
  # renovate: datasource=docker depName=ghcr.io/buvis/koolna-session-manager
  KOOLNA_SESSION_MANAGER_IMAGE: "ghcr.io/buvis/koolna-session-manager:v0.4.3@sha256:3f4316e724fe2ed7edd96e35d6ca0306fec42bc1d2365bb7a65bc85572065a10"
