# Link checker configuration
# Mount this file to /app/config/linkcheck.yml inside the container
# Remove or set enabled: false to disable link checking

enabled: false
interval: 21600  # check every 6 hours (in seconds)

# URL patterns to exclude from checking (regex, applied on top of built-in exclusions)
exclude: []
  # - "^https?://localhost"
  # - "^https?://127\\.0\\.0\\.1"
  # - "^https?://example\\.com"

# Configure one or more notification targets
notifications: []
