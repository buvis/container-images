apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: koolna-cache-data
  namespace: koolna
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 10Gi
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: koolna-cache-ssl
  namespace: koolna
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 1Mi
