[env]
_.file = '.env'

[tasks.build-frontend]
run = "cd frontend && npm install && npm run build"
description = "Build SvelteKit frontend into app/static"

[tasks.dev]
run = "DB_PATH=./exchanger.db LOG_LEVEL=DEBUG uv run python -m uvicorn app.main:get_app --factory --reload --log-level debug"
depends = ["build-frontend"]
description = "Build frontend then run dev server with DEBUG logging"
