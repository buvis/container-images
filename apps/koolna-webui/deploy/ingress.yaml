apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: koolna-webui
  namespace: koolna
  annotations:
    nginx.ingress.kubernetes.io/auth-type: basic
    nginx.ingress.kubernetes.io/auth-secret: koolna-webui-auth
    nginx.ingress.kubernetes.io/auth-realm: "Koolna"
spec:
  ingressClassName: nginx
  rules:
    - host: koolna.local
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: koolna-webui
                port:
                  number: 80
