apiVersion: v1
kind: ServiceAccount
metadata:
  name: koolna-auth-syncer
  namespace: koolna
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: koolna-auth-syncer
  namespace: koolna
rules:
  - apiGroups: [""]
    resources: ["secrets"]
    verbs: ["get", "create", "update", "patch"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: koolna-auth-syncer
  namespace: koolna
subjects:
  - kind: ServiceAccount
    name: koolna-auth-syncer
    namespace: koolna
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: koolna-auth-syncer
