services:
  postgres:
    image: postgres:18@sha256:fec25b861513ced51affc068da8b5ecce1345db5f9f261b7924eb10542aa45c8
    environment:
      POSTGRES_DB: clara
      POSTGRES_USER: clara
      POSTGRES_PASSWORD: clara
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

  redis:
    image: redis:8-alpine@sha256:c5e375abb885e6b2021c0377879e4890bf76f9065b8922ffc113f2b226b9fc17
    ports:
      - "6379:6379"

volumes:
  pgdata:
