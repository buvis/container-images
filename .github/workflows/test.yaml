---
name: Test

on:
  push:
    branches: [master]
    paths:
      - 'apps/**'
      - 'base/**'
      - 'tests/**'
  pull_request:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  GOSS_SLEEP: 30

jobs:
  changes:
    name: Get changes
    runs-on: ubuntu-24.04
    outputs:
      base_matrix: '{"container": ${{ steps.reduce.outputs.base_containers }} }'
      stack_matrix: '{"container": ${{ steps.reduce.outputs.stack_containers }} }'
      has_base: ${{ steps.reduce.outputs.has_base }}
      has_stack: ${{ steps.reduce.outputs.has_stack }}
      has_changes: ${{ steps.filter.outputs.changed }}
    steps:
      - name: Checkout
        uses: actions/checkout@d23441a48e516b6c34aea4fa41551a30e30af803 # v6
      - uses: dorny/paths-filter@7b450fff21473bca461d4b92ce414b9d0420d706 # v4
        id: filter
        with:
          list-files: json
          filters: |
            changed:
            - 'apps/**'
            - 'base/**'
      - run: echo '${{ toJson(steps.filter.outputs) }}' > changes.json
        if: steps.filter.outputs.changed == 'true'
      - id: reduce
        if: steps.filter.outputs.changed == 'true'
        run: |
          ALL=$(jq --raw-output '.changed_files | fromjson | .[] |= sub("(?<filepath>(?<first_directory>(?<root1>[/]?)[^/]+/)(?<second_directory>(?<root2>[/]?)[^/]+)(?<extra_paths>.+))"; "\(.second_directory)") | unique | .[]' changes.json)
          EXISTING="[]"
          for c in $ALL; do
            if [ -d "./apps/$c" ] || [ -d "./base/$c" ]; then
              EXISTING=$(echo "$EXISTING" | jq -c --arg c "$c" '. + [$c]')
            fi
          done

          DEP_MAP=$(cat .github/dep-map.json)
          EXPANDED="$EXISTING"
          for parent in $(echo "$DEP_MAP" | jq -r 'keys[]'); do
            if echo "$EXPANDED" | jq -e --arg p "$parent" 'index($p)' > /dev/null 2>&1; then
              for child in $(echo "$DEP_MAP" | jq -r --arg p "$parent" '.[$p][]'); do
                if [ -d "./apps/$child" ] || [ -d "./base/$child" ]; then
                  EXPANDED=$(echo "$EXPANDED" | jq -c --arg c "$child" 'if index($c) then . else . + [$c] end')
                fi
              done
            fi
          done

          STACK_NAMES=$(echo "$DEP_MAP" | jq -c '[.[][]] | unique')
          BASE=$(echo "$EXPANDED" | jq -c --argjson stack "$STACK_NAMES" '[.[] | select(. as $c | $stack | index($c) | not)]')
          STACK=$(echo "$EXPANDED" | jq -c --argjson stack "$STACK_NAMES" '[.[] | select(. as $c | $stack | index($c))]')

          echo "base_containers=$BASE" >> $GITHUB_OUTPUT
          echo "stack_containers=$STACK" >> $GITHUB_OUTPUT
          if [ "$(echo "$BASE" | jq length)" -gt 0 ]; then echo "has_base=true" >> $GITHUB_OUTPUT; else echo "has_base=false" >> $GITHUB_OUTPUT; fi
          if [ "$(echo "$STACK" | jq length)" -gt 0 ]; then echo "has_stack=true" >> $GITHUB_OUTPUT; else echo "has_stack=false" >> $GITHUB_OUTPUT; fi

  hadolint:
    name: Run hadolint
    needs: changes
    if: needs.changes.outputs.has_changes == 'true'
    runs-on: ubuntu-24.04
    steps:
      - name: Checkout
        uses: actions/checkout@d23441a48e516b6c34aea4fa41551a30e30af803 # v6
      - name: hadolint
        uses: reviewdog/action-hadolint@1b2cfa6ba72072ad35158d7ff3aa49bbdc03506d # v1.51.0
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          reporter: github-pr-review
          filter_mode: diff_context
          fail_level: error

  build-base:
    name: Build base
    runs-on: ubuntu-24.04
    if: needs.changes.outputs.has_base == 'true'
    needs:
      - hadolint
      - changes
    strategy:
      matrix: ${{ fromJson(needs.changes.outputs.base_matrix) }}
      fail-fast: false
    steps:
      - name: Checkout
        uses: actions/checkout@d23441a48e516b6c34aea4fa41551a30e30af803 # v6

      - name: Prepare
        id: prep
        run: |
          if test -f "./apps/${{ matrix.container }}/Dockerfile"; then
            CATEGORY="apps"
          else
            CATEGORY="base"
          fi
          echo "category=${CATEGORY}" >> $GITHUB_OUTPUT
          VERSION=$(cat ./${CATEGORY}/${{ matrix.container }}/VERSION)
          echo "version=${VERSION}" >> $GITHUB_OUTPUT
          if test -f "./${CATEGORY}/${{ matrix.container }}/goss.yaml"; then
            echo "goss=true" >> $GITHUB_OUTPUT
          else
            echo "goss=false" >> $GITHUB_OUTPUT
          fi

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@bb05f3f5519dd87d3ba754cc423b652a5edd6d2c # v4
        with:
          version: latest
          driver-opts: image=moby/buildkit:latest

      - name: Set up goss/dgoss
        if: ${{ steps.prep.outputs.goss == 'true' }}
        run: |
          curl -fsSL "https://github.com/goss-org/goss/releases/download/v0.3.16/goss-linux-amd64" -o /usr/local/bin/goss
          chmod +x /usr/local/bin/goss
          curl -fsSL "https://github.com/goss-org/goss/releases/download/v0.3.16/dgoss" -o /usr/local/bin/dgoss
          chmod +x /usr/local/bin/dgoss

      - name: Build test image
        if: ${{ steps.prep.outputs.goss == 'true' }}
        uses: docker/build-push-action@53b7df96c91f9c12dcc8a07bcb9ccacbed38856a # v7
        with:
          build-args: VERSION=${{ steps.prep.outputs.version }}
          context: ./${{ steps.prep.outputs.category }}/${{ matrix.container }}
          file: ./${{ steps.prep.outputs.category }}/${{ matrix.container }}/Dockerfile
          load: true
          tags: |
            ghcr.io/${{ github.repository_owner }}/${{ matrix.container }}:test

      - name: Run GOSS tests
        if: ${{ steps.prep.outputs.goss == 'true' }}
        env:
          GOSS_FILE: ./${{ steps.prep.outputs.category }}/${{ matrix.container }}/goss.yaml
        run: |
          dgoss run ghcr.io/${{ github.repository_owner }}/${{ matrix.container }}:test

      - name: Build
        uses: docker/build-push-action@53b7df96c91f9c12dcc8a07bcb9ccacbed38856a # v7
        with:
          build-args: VERSION=${{ steps.prep.outputs.version }}
          context: ./${{ steps.prep.outputs.category }}/${{ matrix.container }}
          file: ./${{ steps.prep.outputs.category }}/${{ matrix.container }}/Dockerfile
          push: false

  build-stack:
    name: Build stack
    runs-on: ubuntu-24.04
    if: >-
      always() &&
      needs.changes.outputs.has_stack == 'true' &&
      needs.hadolint.result != 'failure' &&
      needs.build-base.result != 'failure'
    needs:
      - hadolint
      - changes
      - build-base
    strategy:
      matrix: ${{ fromJson(needs.changes.outputs.stack_matrix) }}
      fail-fast: false
    steps:
      - name: Checkout
        uses: actions/checkout@d23441a48e516b6c34aea4fa41551a30e30af803 # v6

      - name: Prepare
        id: prep
        run: |
          if test -f "./apps/${{ matrix.container }}/Dockerfile"; then
            CATEGORY="apps"
          else
            CATEGORY="base"
          fi
          echo "category=${CATEGORY}" >> $GITHUB_OUTPUT
          VERSION=$(cat ./${CATEGORY}/${{ matrix.container }}/VERSION)
          echo "version=${VERSION}" >> $GITHUB_OUTPUT
          if test -f "./${CATEGORY}/${{ matrix.container }}/goss.yaml"; then
            echo "goss=true" >> $GITHUB_OUTPUT
          else
            echo "goss=false" >> $GITHUB_OUTPUT
          fi

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@bb05f3f5519dd87d3ba754cc423b652a5edd6d2c # v4
        with:
          version: latest
          driver-opts: image=moby/buildkit:latest

      - name: Set up goss/dgoss
        if: ${{ steps.prep.outputs.goss == 'true' }}
        run: |
          curl -fsSL "https://github.com/goss-org/goss/releases/download/v0.3.16/goss-linux-amd64" -o /usr/local/bin/goss
          chmod +x /usr/local/bin/goss
          curl -fsSL "https://github.com/goss-org/goss/releases/download/v0.3.16/dgoss" -o /usr/local/bin/dgoss
          chmod +x /usr/local/bin/dgoss

      - name: Build test image
        if: ${{ steps.prep.outputs.goss == 'true' }}
        uses: docker/build-push-action@53b7df96c91f9c12dcc8a07bcb9ccacbed38856a # v7
        with:
          build-args: VERSION=${{ steps.prep.outputs.version }}
          context: ./${{ steps.prep.outputs.category }}/${{ matrix.container }}
          file: ./${{ steps.prep.outputs.category }}/${{ matrix.container }}/Dockerfile
          load: true
          tags: |
            ghcr.io/${{ github.repository_owner }}/${{ matrix.container }}:test

      - name: Run GOSS tests
        if: ${{ steps.prep.outputs.goss == 'true' }}
        env:
          GOSS_FILE: ./${{ steps.prep.outputs.category }}/${{ matrix.container }}/goss.yaml
        run: |
          dgoss run ghcr.io/${{ github.repository_owner }}/${{ matrix.container }}:test

      - name: Build
        uses: docker/build-push-action@53b7df96c91f9c12dcc8a07bcb9ccacbed38856a # v7
        with:
          build-args: VERSION=${{ steps.prep.outputs.version }}
          context: ./${{ steps.prep.outputs.category }}/${{ matrix.container }}
          file: ./${{ steps.prep.outputs.category }}/${{ matrix.container }}/Dockerfile
          push: false

  shell-tests:
    name: Shell tests (bats)
    runs-on: ubuntu-24.04
    steps:
      - name: Checkout
        uses: actions/checkout@d23441a48e516b6c34aea4fa41551a30e30af803 # v6
      - name: Install bats
        run: sudo apt-get update && sudo apt-get install -y bats
      - name: Run bats
        run: bats tests/shell/

  koolna-operator-go:
    name: Go lint+test (koolna-operator)
    runs-on: ubuntu-24.04
    steps:
      - name: Checkout
        uses: actions/checkout@d23441a48e516b6c34aea4fa41551a30e30af803 # v6
      - name: Detect koolna-operator changes
        uses: dorny/paths-filter@7b450fff21473bca461d4b92ce414b9d0420d706 # v4
        id: filter
        with:
          filters: |
            operator:
            - 'apps/koolna-operator/**'
      - name: Setup Go
        if: steps.filter.outputs.operator == 'true'
        uses: actions/setup-go@924ae3a1cded613372ab5595356fb5720e22ba16 # v6
        with:
          go-version-file: apps/koolna-operator/go.mod
          cache-dependency-path: apps/koolna-operator/go.sum
      - name: Lint
        if: steps.filter.outputs.operator == 'true'
        working-directory: apps/koolna-operator
        run: make lint
      - name: Test
        if: steps.filter.outputs.operator == 'true'
        working-directory: apps/koolna-operator
        run: make test

  test-success:
    name: Test
    needs: [hadolint, build-base, build-stack, shell-tests, koolna-operator-go]
    if: always()
    runs-on: ubuntu-24.04
    steps:
      - name: Check results
        run: |
          if [[ "${{ needs.hadolint.result }}" == "failure" || "${{ needs.build-base.result }}" == "failure" || "${{ needs.build-stack.result }}" == "failure" || "${{ needs.shell-tests.result }}" == "failure" || "${{ needs.koolna-operator-go.result }}" == "failure" ]]; then
            exit 1
          fi
