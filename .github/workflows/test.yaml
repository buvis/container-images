---
name: Test

on:
  pull_request:

env:
  GOSS_SLEEP: 30

jobs:
  changes:
    name: Get changes
    runs-on: ubuntu-24.04
    outputs:
      matrix: '{"container": ${{ steps.reduce.outputs.containers }} }'
      has_changes: ${{ steps.filter.outputs.changed }}
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
      - uses: dorny/paths-filter@fbd0ab8f3e69293af611ebaee6363fc25e6d187d # v4
        id: filter
        with:
          list-files: json
          filters: |
            changed:
            - 'apps/**'
            - 'base/**'
      - run: echo '${{ toJson(steps.filter.outputs) }}' > changes.json
        if: steps.filter.outputs.changed == 'true'
      - id: reduce
        if: steps.filter.outputs.changed == 'true'
        run: |
          CONTAINERS=$(jq --raw-output '.changed_files | fromjson | .[] |= sub("(?<filepath>(?<first_directory>(?<root1>[/]?)[^/]+/)(?<second_directory>(?<root2>[/]?)[^/]+)(?<extra_paths>.+))"; "\(.second_directory)") | unique' changes.json)
          echo containers=$CONTAINERS >> $GITHUB_OUTPUT

  hadolint:
    name: Run hadolint
    needs: changes
    if: needs.changes.outputs.has_changes == 'true'
    runs-on: ubuntu-24.04
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
      - name: hadolint
        uses: reviewdog/action-hadolint@921946a7ebaaf08ac72607bad67209f4e52b5407 # v1.50.5
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          reporter: github-pr-review
          filter_mode: diff_context
          fail_level: error

  build:
    name: Build
    runs-on: ubuntu-24.04
    if: needs.changes.outputs.has_changes == 'true'
    needs:
      - hadolint
      - changes
    strategy:
      matrix: ${{ fromJson(needs.changes.outputs.matrix) }}
      fail-fast: false
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Prepare
        id: prep
        run: |
          if test -f "./apps/${{ matrix.container }}/Dockerfile"; then
            CATEGORY="apps"
          else
            CATEGORY="base"
          fi
          echo "category=${CATEGORY}" >> $GITHUB_OUTPUT
          VERSION=$(cat ./${CATEGORY}/${{ matrix.container }}/VERSION)
          echo "version=${VERSION}" >> $GITHUB_OUTPUT
          if test -f "./${CATEGORY}/${{ matrix.container }}/goss.yaml"; then
            echo "goss=true" >> $GITHUB_OUTPUT
          else
            echo "goss=false" >> $GITHUB_OUTPUT
          fi

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@4d04d5d9486b7bd6fa91e7baf45bbb4f8b9deedd # v4
        with:
          version: latest
          driver-opts: image=moby/buildkit:latest

      - name: Set up goss/dgoss
        uses: e1himself/goss-installation-action@3b8340a7c772f8064444f48b0df4c2a80d2e50fc # v1.3.0
        if: ${{ steps.prep.outputs.goss == 'true' }}
        with:
          version: "v0.3.16"

      - name: Build test image
        if: ${{ steps.prep.outputs.goss == 'true' }}
        uses: docker/build-push-action@d08e5c354a6adb9ed34480a06d141179aa583294 # v7
        with:
          build-args: VERSION=${{ steps.prep.outputs.version }}
          context: ./${{ steps.prep.outputs.category }}/${{ matrix.container }}
          file: ./${{ steps.prep.outputs.category }}/${{ matrix.container }}/Dockerfile
          load: true
          tags: |
            ghcr.io/${{ github.repository_owner }}/${{ matrix.container }}:test

      - name: Run GOSS tests
        if: ${{ steps.prep.outputs.goss == 'true' }}
        env:
          GOSS_FILE: ./${{ steps.prep.outputs.category }}/${{ matrix.container }}/goss.yaml
        run: |
          dgoss run ghcr.io/${{ github.repository_owner }}/${{ matrix.container }}:test

      - name: Build
        uses: docker/build-push-action@d08e5c354a6adb9ed34480a06d141179aa583294 # v7
        with:
          build-args: VERSION=${{ steps.prep.outputs.version }}
          context: ./${{ steps.prep.outputs.category }}/${{ matrix.container }}
          file: ./${{ steps.prep.outputs.category }}/${{ matrix.container }}/Dockerfile
          push: false

  test-success:
    name: Test
    needs: [hadolint, build]
    if: always()
    runs-on: ubuntu-24.04
    steps:
      - name: Check results
        run: |
          if [[ "${{ needs.hadolint.result }}" == "failure" || "${{ needs.build.result }}" == "failure" ]]; then
            exit 1
          fi
