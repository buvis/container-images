---
name: Get latest versions

on:
  workflow_dispatch:
  schedule:
  - cron: "0 */4 * * *"

jobs:
  detect-updates:
    runs-on: ubuntu-24.04
    outputs:
      matrix: ${{ steps.check.outputs.matrix }}
      has-updates: ${{ steps.check.outputs.has-updates }}
    steps:
    - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
      with:
        fetch-depth: 1
    - name: Check for version updates
      id: check
      run: |
        updates="[]"
        for category in base apps; do
          for dir in ./${category}/*/; do
            [ -d "${dir}" ] || continue
            app=$(basename "${dir}")
            if test -f "./${category}/${app}/latest-version.sh"; then
              current=$(cat "./${category}/${app}/VERSION")
              latest=$(bash "./${category}/${app}/latest-version.sh")
              if [[ -n "${latest}" && "${latest}" != "null" && "${latest}" != "${current}" ]]; then
                echo "${category}/${app}: ${current} -> ${latest}"
                updates=$(echo "${updates}" | jq -c --arg cat "${category}" --arg app "${app}" --arg ver "${latest}" '. + [{"category": $cat, "app": $app, "version": $ver}]')
              fi
            fi
          done
        done
        echo "matrix={\"include\":${updates}}" >> $GITHUB_OUTPUT
        if [ "${updates}" != "[]" ]; then
          echo "has-updates=true" >> $GITHUB_OUTPUT
        else
          echo "has-updates=false" >> $GITHUB_OUTPUT
        fi

  create-pr:
    runs-on: ubuntu-24.04
    needs: detect-updates
    if: needs.detect-updates.outputs.has-updates == 'true'
    strategy:
      matrix: ${{ fromJson(needs.detect-updates.outputs.matrix) }}
      fail-fast: false
    steps:
    - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
      with:
        fetch-depth: 1
    - name: Update VERSION file
      run: echo "${{ matrix.version }}" > "./${{ matrix.category }}/${{ matrix.app }}/VERSION"
    - name: Create pull request
      id: create-pr
      uses: peter-evans/create-pull-request@5f6978faf089d4d20b00c7766989d076bb2fc7f1 # v8
      with:
        token: ${{ secrets.BOT_TOKEN }}
        branch: "chore/update-${{ matrix.app }}-${{ matrix.version }}"
        delete-branch: true
        title: "Update ${{ matrix.app }} to version ${{ matrix.version }}"
        signoff: true
        committer: "${{ github.actor }} <${{ github.actor }}@users.noreply.github.com>"
        author: "${{ github.actor }} <${{ github.actor }}@users.noreply.github.com>"
        assignees: "tbouska"
        commit-message: "chore: update ${{ matrix.app }} to version ${{ matrix.version }}"
        labels: chore/update
    - name: Enable auto-merge
      if: steps.create-pr.outputs.pull-request-number
      run: gh pr merge ${{ steps.create-pr.outputs.pull-request-number }} --squash --auto
      env:
        GH_TOKEN: ${{ secrets.BOT_TOKEN }}
