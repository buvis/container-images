---
name: Release

on:
  push:
    branches: [master]
    paths:
      - "apps/**"
      - "base/**"
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: write
  packages: write

env:
  GOSS_SLEEP: 30

jobs:
  changes:
    name: Get changes
    runs-on: ubuntu-24.04
    outputs:
      base_matrix: '{"container": ${{ steps.reduce.outputs.base_containers }} }'
      stack_matrix: '{"container": ${{ steps.reduce.outputs.stack_containers }} }'
      all_containers: ${{ steps.reduce.outputs.all_containers }}
      has_base: ${{ steps.reduce.outputs.has_base }}
      has_stack: ${{ steps.reduce.outputs.has_stack }}
    steps:
      - name: Checkout
        uses: actions/checkout@d23441a48e516b6c34aea4fa41551a30e30af803 # v6
      - uses: dorny/paths-filter@7b450fff21473bca461d4b92ce414b9d0420d706 # v4
        id: filter
        with:
          list-files: json
          filters: |
            changed:
            - 'apps/**'
            - 'base/**'
      - run: echo '${{ toJson(steps.filter.outputs) }}' > changes.json
      - id: reduce
        run: |
          ALL=$(jq --raw-output '.changed_files | fromjson | .[] |= sub("(?<filepath>(?<first_directory>(?<root1>[/]?)[^/]+/)(?<second_directory>(?<root2>[/]?)[^/]+)(?<extra_paths>.+))"; "\(.second_directory)") | unique | .[]' changes.json)
          EXISTING="[]"
          for c in $ALL; do
            if [ -d "./apps/$c" ] || [ -d "./base/$c" ]; then
              EXISTING=$(echo "$EXISTING" | jq -c --arg c "$c" '. + [$c]')
            fi
          done

          DEP_MAP=$(cat .github/dep-map.json)
          EXPANDED="$EXISTING"
          for parent in $(echo "$DEP_MAP" | jq -r 'keys[]'); do
            if echo "$EXPANDED" | jq -e --arg p "$parent" 'index($p)' > /dev/null 2>&1; then
              for child in $(echo "$DEP_MAP" | jq -r --arg p "$parent" '.[$p][]'); do
                if [ -d "./apps/$child" ] || [ -d "./base/$child" ]; then
                  EXPANDED=$(echo "$EXPANDED" | jq -c --arg c "$child" 'if index($c) then . else . + [$c] end')
                fi
              done
            fi
          done

          STACK_NAMES=$(echo "$DEP_MAP" | jq -c '[.[][]] | unique')
          BASE=$(echo "$EXPANDED" | jq -c --argjson stack "$STACK_NAMES" '[.[] | select(. as $c | $stack | index($c) | not)]')
          STACK=$(echo "$EXPANDED" | jq -c --argjson stack "$STACK_NAMES" '[.[] | select(. as $c | $stack | index($c))]')

          echo "base_containers=$BASE" >> $GITHUB_OUTPUT
          echo "stack_containers=$STACK" >> $GITHUB_OUTPUT
          echo "all_containers=$(echo "$EXPANDED" | jq -c '.')" >> $GITHUB_OUTPUT
          if [ "$(echo "$BASE" | jq length)" -gt 0 ]; then echo "has_base=true" >> $GITHUB_OUTPUT; else echo "has_base=false" >> $GITHUB_OUTPUT; fi
          if [ "$(echo "$STACK" | jq length)" -gt 0 ]; then echo "has_stack=true" >> $GITHUB_OUTPUT; else echo "has_stack=false" >> $GITHUB_OUTPUT; fi

  build-base:
    name: Build base
    runs-on: ubuntu-24.04
    needs:
      - changes
    strategy:
      matrix: ${{ fromJson(needs.changes.outputs.base_matrix) }}
      fail-fast: false
    if: needs.changes.outputs.has_base == 'true' && !contains(github.event.head_commit.message, '[skip ci]')
    steps:
      - name: Checkout
        uses: actions/checkout@d23441a48e516b6c34aea4fa41551a30e30af803 # v6

      - name: Prepare
        id: prep
        run: |
          if test -f "./apps/${{ matrix.container }}/Dockerfile"; then
            CATEGORY="apps"
          else
            CATEGORY="base"
          fi
          echo "category=${CATEGORY}" >> $GITHUB_OUTPUT
          VERSION=$(cat ./${CATEGORY}/${{ matrix.container }}/VERSION)
          echo "version=${VERSION}" >> $GITHUB_OUTPUT
          PLATFORM=$(cat ./${CATEGORY}/${{ matrix.container }}/PLATFORM)
          echo "platform=${PLATFORM}" >> $GITHUB_OUTPUT
          if test -f "./${CATEGORY}/${{ matrix.container }}/goss.yaml"; then
            echo "goss=true" >> $GITHUB_OUTPUT
          else
            echo "goss=false" >> $GITHUB_OUTPUT
          fi

      - name: Set up QEMU
        uses: docker/setup-qemu-action@96fe6ef7f33517b61c61be40b68a1882f3264fb8 # v4
        with:
          platforms: amd64,arm64,arm

      - name: Login to Docker Hub
        uses: docker/login-action@abd2ef45e78c5afb21d64d4ca52ee8550d9572c7 # v4
        with:
          username: ${{ secrets.DOCKER_USER }}
          password: ${{ secrets.DOCKER_PASS }}

      - name: Login to GHCR
        uses: docker/login-action@abd2ef45e78c5afb21d64d4ca52ee8550d9572c7 # v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        id: buildx
        uses: docker/setup-buildx-action@bb05f3f5519dd87d3ba754cc423b652a5edd6d2c # v4
        with:
          version: latest
          driver-opts: image=moby/buildkit:latest

      - name: Cache Docker layers
        uses: actions/cache@caa296126883cff596d87d8935842f9db880ef25 # v5
        with:
          path: /tmp/.buildx-cache
          key: ${{ secrets.DOCKER_REGISTRY }}/${{ github.repository_owner }}/${{ matrix.container }}
          restore-keys: |
            ${{ secrets.DOCKER_REGISTRY }}/${{ github.repository_owner }}/${{ matrix.container }}

      - name: Set up goss/dgoss
        if: ${{ steps.prep.outputs.goss == 'true' }}
        run: |
          curl -fsSL "https://github.com/goss-org/goss/releases/download/v0.3.16/goss-linux-amd64" -o /usr/local/bin/goss
          chmod +x /usr/local/bin/goss
          curl -fsSL "https://github.com/goss-org/goss/releases/download/v0.3.16/dgoss" -o /usr/local/bin/dgoss
          chmod +x /usr/local/bin/dgoss

      - name: Build and Load local test-container
        if: ${{ steps.prep.outputs.goss == 'true' }}
        uses: docker/build-push-action@53b7df96c91f9c12dcc8a07bcb9ccacbed38856a # v7
        with:
          build-args: VERSION=${{ steps.prep.outputs.version }}
          context: ./${{ steps.prep.outputs.category }}/${{ matrix.container }}
          file: ./${{ steps.prep.outputs.category }}/${{ matrix.container }}/Dockerfile
          load: true
          tags: |
            ghcr.io/${{ github.repository_owner }}/${{ matrix.container }}:test
          cache-from: "type=local,src=/tmp/.buildx-cache"
          cache-to: "type=local,dest=/tmp/.buildx-cache,mode=max"

      - name: Run GOSS tests
        if: ${{ steps.prep.outputs.goss == 'true' }}
        env:
          GOSS_FILE: ./${{ steps.prep.outputs.category }}/${{ matrix.container }}/goss.yaml
        run: |
          dgoss run ghcr.io/${{ github.repository_owner }}/${{ matrix.container }}:test

      - name: Build and Push
        uses: docker/build-push-action@53b7df96c91f9c12dcc8a07bcb9ccacbed38856a # v7
        with:
          build-args: VERSION=${{ steps.prep.outputs.version }}
          context: ./${{ steps.prep.outputs.category }}/${{ matrix.container }}
          file: ./${{ steps.prep.outputs.category }}/${{ matrix.container }}/Dockerfile
          platforms: ${{ steps.prep.outputs.platform }}
          push: true
          tags: |
            buvis/${{ matrix.container }}:latest
            buvis/${{ matrix.container }}:v${{ steps.prep.outputs.version }}
            ghcr.io/${{ github.repository_owner }}/${{ matrix.container }}:latest
            ghcr.io/${{ github.repository_owner }}/${{ matrix.container }}:v${{ steps.prep.outputs.version }}
          cache-from: "type=local,src=/tmp/.buildx-cache"
          cache-to: "type=local,dest=/tmp/.buildx-cache,mode=max"

  build-stack:
    name: Build stack
    runs-on: ubuntu-24.04
    if: >-
      always() &&
      needs.changes.outputs.has_stack == 'true' &&
      !contains(github.event.head_commit.message, '[skip ci]') &&
      needs.build-base.result != 'failure'
    needs:
      - changes
      - build-base
    strategy:
      matrix: ${{ fromJson(needs.changes.outputs.stack_matrix) }}
      fail-fast: false
    steps:
      - name: Checkout
        uses: actions/checkout@d23441a48e516b6c34aea4fa41551a30e30af803 # v6

      - name: Prepare
        id: prep
        run: |
          if test -f "./apps/${{ matrix.container }}/Dockerfile"; then
            CATEGORY="apps"
          else
            CATEGORY="base"
          fi
          echo "category=${CATEGORY}" >> $GITHUB_OUTPUT
          VERSION=$(cat ./${CATEGORY}/${{ matrix.container }}/VERSION)
          echo "version=${VERSION}" >> $GITHUB_OUTPUT
          PLATFORM=$(cat ./${CATEGORY}/${{ matrix.container }}/PLATFORM)
          echo "platform=${PLATFORM}" >> $GITHUB_OUTPUT
          if test -f "./${CATEGORY}/${{ matrix.container }}/goss.yaml"; then
            echo "goss=true" >> $GITHUB_OUTPUT
          else
            echo "goss=false" >> $GITHUB_OUTPUT
          fi

      - name: Set up QEMU
        uses: docker/setup-qemu-action@96fe6ef7f33517b61c61be40b68a1882f3264fb8 # v4
        with:
          platforms: amd64,arm64,arm

      - name: Login to Docker Hub
        uses: docker/login-action@abd2ef45e78c5afb21d64d4ca52ee8550d9572c7 # v4
        with:
          username: ${{ secrets.DOCKER_USER }}
          password: ${{ secrets.DOCKER_PASS }}

      - name: Login to GHCR
        uses: docker/login-action@abd2ef45e78c5afb21d64d4ca52ee8550d9572c7 # v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        id: buildx
        uses: docker/setup-buildx-action@bb05f3f5519dd87d3ba754cc423b652a5edd6d2c # v4
        with:
          version: latest
          driver-opts: image=moby/buildkit:latest

      - name: Cache Docker layers
        uses: actions/cache@caa296126883cff596d87d8935842f9db880ef25 # v5
        with:
          path: /tmp/.buildx-cache
          key: ${{ secrets.DOCKER_REGISTRY }}/${{ github.repository_owner }}/${{ matrix.container }}
          restore-keys: |
            ${{ secrets.DOCKER_REGISTRY }}/${{ github.repository_owner }}/${{ matrix.container }}

      - name: Set up goss/dgoss
        if: ${{ steps.prep.outputs.goss == 'true' }}
        run: |
          curl -fsSL "https://github.com/goss-org/goss/releases/download/v0.3.16/goss-linux-amd64" -o /usr/local/bin/goss
          chmod +x /usr/local/bin/goss
          curl -fsSL "https://github.com/goss-org/goss/releases/download/v0.3.16/dgoss" -o /usr/local/bin/dgoss
          chmod +x /usr/local/bin/dgoss

      - name: Build and Load local test-container
        if: ${{ steps.prep.outputs.goss == 'true' }}
        uses: docker/build-push-action@53b7df96c91f9c12dcc8a07bcb9ccacbed38856a # v7
        with:
          build-args: VERSION=${{ steps.prep.outputs.version }}
          context: ./${{ steps.prep.outputs.category }}/${{ matrix.container }}
          file: ./${{ steps.prep.outputs.category }}/${{ matrix.container }}/Dockerfile
          load: true
          tags: |
            ghcr.io/${{ github.repository_owner }}/${{ matrix.container }}:test
          cache-from: "type=local,src=/tmp/.buildx-cache"
          cache-to: "type=local,dest=/tmp/.buildx-cache,mode=max"

      - name: Run GOSS tests
        if: ${{ steps.prep.outputs.goss == 'true' }}
        env:
          GOSS_FILE: ./${{ steps.prep.outputs.category }}/${{ matrix.container }}/goss.yaml
        run: |
          dgoss run ghcr.io/${{ github.repository_owner }}/${{ matrix.container }}:test

      - name: Build and Push
        uses: docker/build-push-action@53b7df96c91f9c12dcc8a07bcb9ccacbed38856a # v7
        with:
          build-args: VERSION=${{ steps.prep.outputs.version }}
          context: ./${{ steps.prep.outputs.category }}/${{ matrix.container }}
          file: ./${{ steps.prep.outputs.category }}/${{ matrix.container }}/Dockerfile
          platforms: ${{ steps.prep.outputs.platform }}
          push: true
          tags: |
            buvis/${{ matrix.container }}:latest
            buvis/${{ matrix.container }}:v${{ steps.prep.outputs.version }}
            ghcr.io/${{ github.repository_owner }}/${{ matrix.container }}:latest
            ghcr.io/${{ github.repository_owner }}/${{ matrix.container }}:v${{ steps.prep.outputs.version }}
          cache-from: "type=local,src=/tmp/.buildx-cache"
          cache-to: "type=local,dest=/tmp/.buildx-cache,mode=max"

  release:
    name: Release
    runs-on: ubuntu-24.04
    needs: [changes, build-base, build-stack]
    if: >-
      always() &&
      github.ref == 'refs/heads/master' &&
      !contains(github.event.head_commit.message, '[skip ci]') &&
      needs.build-base.result != 'failure' &&
      needs.build-stack.result != 'failure'
    steps:
      - name: Checkout
        uses: actions/checkout@d23441a48e516b6c34aea4fa41551a30e30af803 # v6
        with:
          fetch-depth: 0
          token: ${{ secrets.BOT_TOKEN }}

      - name: Create or update GitHub Releases
        env:
          GH_TOKEN: ${{ secrets.BOT_TOKEN }}
          ALL_CONTAINERS: ${{ needs.changes.outputs.all_containers }}
        run: |
          for CONTAINER in $(echo "${ALL_CONTAINERS}" | jq -r '.[]'); do
            if test -f "./apps/${CONTAINER}/Dockerfile"; then
              CATEGORY="apps"
            else
              CATEGORY="base"
            fi
            VERSION=$(cat "./${CATEGORY}/${CONTAINER}/VERSION")
            TAG="${CONTAINER}/v${VERSION}"
            DIR="./${CATEGORY}/${CONTAINER}"
            NOTES=$(awk '/^## [0-9]/{if(n++)exit}n' "${DIR}/CHANGELOG.md")
            if gh release view "${TAG}" >/dev/null 2>&1; then
              gh release edit "${TAG}" --notes "${NOTES}"
            else
              if ! git rev-parse "${TAG}" >/dev/null 2>&1; then
                git tag "${TAG}"
              fi
              git push origin "${TAG}"
              gh release create "${TAG}" \
                --title "${CONTAINER} v${VERSION}" \
                --notes "${NOTES}"
            fi
          done
